<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Multimedial</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f6f2f4;
    margin: 0;
    color: #3a2b2f;
}

/* contenedor */
.contenedor {
    column-count: 3;
    column-gap: 20px;
    width: 95%;
    margin: auto;
}

/* bloques */
.bloque {
    background-color: #ffffff;
    margin: 20px 0;
    border-radius: 12px;
    overflow: hidden;
    display: inline-block;
    width: 100%;
    transition: 0.3s ease;
    cursor: pointer;
}

/* tamaños pinterest */
.bloque.grande img {
    height: 420px;
    object-fit: cover;
}

.bloque.mediano img {
    height: 300px;
    object-fit: cover;
}

.bloque.pequeno img {
    height: 220px;
    object-fit: cover;
}

.bloque:hover {
    transform: translateY(-6px);
}

.bloque img {
    width: 100%;
}

/* contenido */
.contenido {
    padding: 15px;
    background: linear-gradient(to top, rgba(255,255,255,0.9), transparent);
}

.bloque h2 {
    margin: 10px 0;
    color: #7a3e52;
}

.bloque p {
    font-size: 14px;
    color: #6b5b60;
}

/* modal */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
}

.modal.active {
    opacity: 1;
    pointer-events: all;
}

.modal img {
    max-width: 80%;
    max-height: 80%;
}

/* 🔴 BLOQUE ORIGINAL INTEGRADO */
.footer-extra {
    text-align: center;
    margin: 60px 0;
}

.footer-extra img {
    border-radius: 10px;
    margin-top: 10px;
    transition: 0.3s;
}

.footer-extra img:hover {
    transform: scale(1.05);
}

.footer-extra a {
    color: #7a3e52;
    text-decoration: none;
}

.footer-extra a:hover {
    color: #a14a68;
}

/* responsive */
@media (max-width: 900px) {
    .contenedor { column-count: 2; }
}

@media (max-width: 600px) {
    .contenedor { column-count: 1; }
}
</style>

</head>

<!-- modal -->

</div>

<script>
// color dinámico suave
function getColor(img){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    let data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

    let r=0,g=0,b=0,c=0;

    for(let i=0;i<data.length;i+=120){
        r+=data[i];
        g+=data[i+1];
        b+=data[i+2];
        c++;
    }

    return {
        r:Math.floor(r/c),
        g:Math.floor(g/c),
        b:Math.floor(b/c)
    };
}

document.querySelectorAll(".bloque").forEach(b=>{
    const img = b.querySelector("img");
    const cont = b.querySelector(".contenido");

    img.onload = ()=>{
        let col = getColor(img);
        cont.style.background =
        `linear-gradient(to top, rgba(${col.r},${col.g},${col.b},0.25), rgba(255,255,255,0.9))`;
    }

    if(img.complete) img.onload();
});

// modal
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

document.querySelectorAll(".bloque img").forEach(img=>{
    img.addEventListener("click", ()=>{
        modal.classList.add("active");
        modalImg.src = img.src;
    });
});

modal.addEventListener("click", ()=>{
    modal.classList.remove("active");
});
</script>
